name: Update admin dashboard

on:
  push:
    branches: [main]
    paths-ignore:
      - 'admin-3e561cef51.html'
      - '.github/workflows/update-admin-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate admin page counts
        run: python3 scripts/build_admin_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add admin-3e561cef51.html
          if git diff --cached --quiet; then
            echo "No changes to admin dashboard."
          else
            git commit -m "chore: auto-update admin dashboard counts"
            git push
          fi
